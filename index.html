<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Service Receiver</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/gh/lazywasabi/thai-web-fonts@latest/fonts/LINESeedSansTH/LINESeedSansTH.css"
        rel="stylesheet" />

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['"LINE Seed Sans TH"', 'sans-serif'] },
                    colors: { brand: { blue: '#0044FF', orange: '#FF5500' } },
                    keyframes: {
                        popIn: { '0%': { opacity: '0', transform: 'scale(0.9) translateY(10px)' }, '100%': { opacity: '1', transform: 'scale(1) translateY(0)' } },
                        slideUpFade: { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } }
                    },
                    animation: { popIn: 'popIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards', slideUpFade: 'slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards' }
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'LINE Seed Sans TH', sans-serif;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .content-transition {
            transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .content-hidden {
            opacity: 0 !important;
            transform: scale(0.95) translateY(10px) !important;
            pointer-events: none;
        }

        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        select {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
        }
    </style>
</head>

<body
    class="bg-white dark:bg-black text-neutral-900 dark:text-white min-h-screen selection:bg-neutral-300 dark:selection:bg-white/30 flex flex-col items-center relative overflow-x-hidden transition-colors duration-500">

    <div class="w-full max-w-md p-4 min-h-screen flex flex-col relative z-10">

        <!-- Header: โลโก้ และ ปุ่มสามขีด -->
        <div class="flex justify-between items-center py-4 mb-6 relative z-50">
            <div class="relative flex items-center h-10 w-32">
                <div id="main-brand-logo"
                    class="absolute left-0 flex items-center transition-all duration-300 transform origin-left h-10 w-auto">
                    <img src="./logo-light.png" alt="Logo Light" class="h-full w-auto object-contain block dark:hidden"
                        onerror="this.style.display='none'" />
                    <img src="./logo-dark.png" alt="Logo Dark" class="h-full w-auto object-contain hidden dark:block"
                        onerror="this.style.display='none'" />
                </div>
                <button id="back-btn" onclick="goToHome()"
                    class="absolute left-0 opacity-0 pointer-events-none flex items-center text-lg font-bold text-neutral-600 dark:text-neutral-300 hover:text-black dark:hover:text-white transition-all duration-300 transform -translate-x-4">
                    <svg class="w-6 h-6 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7" />
                    </svg>
                    หน้าแรก
                </button>
            </div>

            <!-- ปุ่มสามขีดตั้งค่า (Hamburger ) -->
            <div class="relative ml-auto">
                <button id="hamburger-btn" onclick="toggleMenu(event)"
                    class="p-2 rounded-xl text-neutral-600 dark:text-neutral-300 hover:bg-neutral-100 dark:hover:bg-neutral-800 transition-colors focus:outline-none">
                    <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                            d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                </button>

                <div id="dropdown-menu"
                    class="absolute right-0 mt-2 w-56 bg-white dark:bg-neutral-900 rounded-2xl shadow-xl border border-neutral-100 dark:border-neutral-800 opacity-0 pointer-events-none transform scale-95 transition-all duration-200 z-50 overflow-hidden">
                    <div class="py-2 flex flex-col">
                        <button onclick="document.documentElement.classList.toggle('dark'); toggleMenu(event);"
                            class="w-full flex items-center px-4 py-3 text-sm font-bold text-neutral-700 dark:text-neutral-300 hover:bg-neutral-50 dark:hover:bg-neutral-800 transition-colors text-left">
                            <span class="mr-3"><svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5"
                                    viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" />
                                </svg></span>
                            <span class="dark:hidden">เปิดโหมดกลางคืน</span>
                            <span class="hidden dark:inline">เปิดโหมดสว่าง</span>
                        </button>

                        <a href="https://lin.ee/tNXgZoM" target="_blank" onclick="toggleMenu(event)"
                            class="w-full flex items-center px-4 py-3 text-sm font-bold text-neutral-700 dark:text-neutral-300 hover:bg-neutral-50 dark:hover:bg-neutral-800 transition-colors text-left border-t border-neutral-100 dark:border-neutral-800">
                            <span class="mr-3"><svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5"
                                    viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M8.625 12a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H8.25m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H12m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0h-.375M21 12c0 4.556-4.03 8.25-9 8.25a9.764 9.764 0 01-2.555-.337A5.972 5.972 0 015.41 20.97a5.969 5.969 0 01-.474-.065 4.48 4.48 0 00.978-2.025c.09-.457-.133-.901-.467-1.226C3.93 16.178 3 14.189 3 12c0-4.556 4.03-8.25 9-8.25s9 3.694 9 8.25z" />
                                </svg></span>
                            ติดต่อเรา
                        </a>

                        <a href="https://drive.google.com/drive/folders/1S0FGZFR58UJDFgG2FxLC1HdhGlQmM5h_"
                            target="_blank" onclick="toggleMenu(event)"
                            class="w-full flex items-center px-4 py-3 text-sm font-bold text-neutral-700 dark:text-neutral-300 hover:bg-neutral-50 dark:hover:bg-neutral-800 transition-colors text-left border-t border-neutral-100 dark:border-neutral-800">
                            <span class="mr-3"><svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5"
                                    viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M9.879 7.519c1.171-1.025 3.071-1.025 4.242 0 1.172 1.025 1.172 2.687 0 3.712-.203.179-.43.326-.67.442-.745.361-1.45.999-1.45 1.827v.75M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9 5.25h.008v.008H12v-.008z" />
                                </svg></span>
                            วิธีใช้งาน
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- หน้าแรก -->
        <div id="screen-home" class="flex-1 flex flex-col items-center content-transition w-full">
            <h1 class="text-3xl font-extrabold mb-2 text-center mt-2 tracking-tight">บริการของเรา</h1>
            <p class="text-neutral-500 dark:text-neutral-400 text-sm mb-6 text-center font-normal">
                เลือกบริการที่ต้องการรับรหัสยืนยัน OTP</p>
            <div id="app-grid" class="w-full space-y-4"></div>
        </div>

        <!-- หน้าบริการ -->
        <div id="screen-service"
            class="flex-1 flex flex-col items-center content-transition w-full hidden absolute top-[90px] left-0 px-4 pb-10 z-10">
            <div id="main-logo-container"
                class="w-24 h-24 rounded-2xl mb-4 flex items-center justify-center bg-white dark:bg-neutral-900 border border-neutral-200 dark:border-neutral-800 p-0 overflow-hidden shadow-sm transition-all duration-700 relative">
                <img id="main-logo-img" src="" alt="Logo" class="w-full h-full object-cover transform scale-110"
                    onerror="this.src='https://placehold.co/100x100/png'" />
            </div>

            <h1 class="text-2xl font-bold mb-1 text-center transition-colors duration-500 tracking-tight">
                OTP <span id="main-title-text" class=""></span>
            </h1>
            <p class="text-neutral-500 dark:text-neutral-400 text-sm mb-5 text-center font-normal">
                กรอกอีเมลที่ต้องการรับรหัสยืนยัน</p>

            <div class="w-full space-y-3 mb-2">
                <!-- ระบบเลือก Email System อัตโนมัติ (ไม่ต้องให้ลูกค้าเลือก) -->

                <div class="w-full relative">
                    <input type="email" id="email-input" placeholder="Email Address"
                        class="w-full bg-white dark:bg-neutral-900/80 backdrop-blur-md border border-neutral-200 dark:border-neutral-700 text-neutral-900 dark:text-white rounded-2xl px-5 py-4 outline-none focus:border-neutral-400 dark:focus:border-white transition-all placeholder-neutral-400 dark:placeholder-neutral-600 text-lg shadow-sm dark:shadow-inner font-medium" />
                </div>
                <div class="w-full relative">
                    <input type="text" id="device-input" placeholder="ชื่ออุปกรณ์"
                        class="w-full bg-white dark:bg-neutral-900/80 backdrop-blur-md border border-neutral-200 dark:border-neutral-700 text-neutral-900 dark:text-white rounded-2xl px-5 py-4 outline-none focus:border-neutral-400 dark:focus:border-white transition-all placeholder-neutral-400 dark:placeholder-neutral-600 text-lg shadow-sm dark:shadow-inner font-medium" />
                </div>
            </div>

            <div id="error-message"
                class="w-full text-red-500 text-sm pl-2 mb-4 h-5 opacity-0 transition-opacity duration-300 font-medium">
            </div>

            <button id="fetch-btn" onclick="handleFetchOTP()"
                class="w-full py-4 rounded-2xl font-bold text-lg transition-all duration-500 flex items-center justify-center space-x-2 shadow-lg mb-8 relative overflow-hidden group tracking-wide"></button>

            <div class="w-full flex items-center mb-6 opacity-50 dark:opacity-30">
                <div class="flex-1 border-t border-neutral-300 dark:border-neutral-600"></div>
                <span class="px-3 text-xs text-neutral-500 dark:text-neutral-400 font-medium">รายการข้อความล่าสุด</span>
                <div class="flex-1 border-t border-neutral-300 dark:border-neutral-600"></div>
            </div>

            <div id="otp-list-container" class="w-full space-y-3 pb-10"></div>
        </div>
    </div>

    <!-- Modal กรอกหัส PI -->
    <div id="pin-modal"
        class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden flex justify-center items-center opacity-0 transition-opacity duration-300">
        <div class="bg-white dark:bg-neutral-900 w-[90%] max-w-sm rounded-3xl p-6 shadow-2xl transform scale-95 transition-transform duration-300"
            id="pin-modal-content">
            <h3
                class="text-xl font-bold text-center text-neutral-900 dark:text-white mb-2 tracking-tight flex items-center justify-center space-x-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
                </svg><span>กรุณากรอกรหัส PIN</span>
            </h3>
            <p class="text-sm text-neutral-500 dark:text-neutral-400 text-center mb-6">อีเมลนี้ถูกตั้งค่าความปลอดภัยไว้
            </p>

            <input type="number" id="pin-input" placeholder="••••••" maxlength="6"
                class="w-full text-center tracking-[1em] font-bold text-3xl bg-neutral-100 dark:bg-neutral-800 border border-neutral-200 dark:border-neutral-700 text-neutral-900 dark:text-white rounded-2xl px-5 py-4 outline-none mb-4 shadow-inner" />

            <div id="pin-error" class="text-red-500 text-xs text-center mb-4 hidden font-medium"></div>

            <div class="flex space-x-3">
                <button onclick="closePinModal()"
                    class="flex-1 py-3 rounded-xl font-bold bg-neutral-100 dark:bg-neutral-800 text-neutral-700 dark:text-neutral-300 hover:bg-neutral-200 dark:hover:bg-neutral-700 active:scale-95 transition-all">ยกเลิก</button>
                <button onclick="submitPin()"
                    class="flex-1 py-3 rounded-xl font-bold bg-blue-600 text-white hover:bg-blue-700 active:scale-95 transition-all">ยืนยัน</button>
            </div>
        </div>
    </div>

    <script>
        // ⚡️ เพิ่มลิงก์ระบบหลังบ้านตรงนี้ (ดึงจาก origin ปัจจุบันของหน้าเว็บโดยอัตโนมัติ)
        const BASE_URL = window.location.origin;

        const SERVICES = [
            { id: 'disney', name: 'Disney+', bgCol: 'bg-[#0050FF]', text: 'text-[#0050FF] dark:text-[#3377FF]', localImage: './disney.jpg' },
            { id: 'chatgpt', name: 'ChatGPT', bgCol: 'bg-[#10A37F]', text: 'text-[#10A37F] dark:text-[#10A37F]', localImage: './gpt.jpg' },
            { id: 'trueid', name: 'TrueID', bgCol: 'bg-[#E81C24]', text: 'text-[#E81C24] dark:text-[#E81C24]', localImage: './trueid.jpg' },
            { id: 'youku', name: 'Youku', bgCol: 'bg-[#00A0E9]', text: 'text-[#00A0E9] dark:text-[#00A0E9]', localImage: './youku.jpg' }
        ];

        let activeService = null;
        let cooldown = 0;
        let isLoading = false;
        let isSwitchingScreen = false;
        let otpList = [];
        let pendingRequest = null;

        // จัดการเมนูสามขีด
        let isMenuOpen = false;
        function toggleMenu(event) {
            if (event) event.stopPropagation();
            const menu = document.getElementById('dropdown-menu');
            isMenuOpen = !isMenuOpen;
            if (isMenuOpen) {
                menu.classList.remove('opacity-0', 'pointer-events-none', 'scale-95');
                menu.classList.add('opacity-100', 'pointer-events-auto', 'scale-100');
            } else {
                menu.classList.add('opacity-0', 'pointer-events-none', 'scale-95');
                menu.classList.remove('opacity-100', 'pointer-events-auto', 'scale-100');
            }
        }

        document.addEventListener('click', function (event) {
            const menu = document.getElementById('dropdown-menu');
            const btn = document.getElementById('hamburger-btn');
            if (isMenuOpen && !menu.contains(event.target) && !btn.contains(event.target)) {
                toggleMenu();
            }
        });

        async function executeFetch(reqData) {
            isLoading = true; updateButton();
            const errorMsg = document.getElementById('error-message');
            const pinError = document.getElementById('pin-error');

            try {
                // ⚡️ นำ BASE_URL มาใช้เชื่อมต่อกับเซิร์ฟเวอร์
                const apiUrl = `${BASE_URL}/api/get-otp?service=${reqData.service}&email=${encodeURIComponent(reqData.email)}&device=${encodeURIComponent(reqData.device)}&systemType=${reqData.system}&pin=${reqData.pin}`;

                const response = await fetch(apiUrl, { mode: 'cors', headers: { 'Accept': 'application/json' } });
                const data = await response.json();

                if (data.requirePin) {
                    isLoading = false; updateButton(); openPinModal(); return;
                }

                if (data.success) {
                    closePinModal();
                    const now = new Date();
                    const newOtp = {
                        id: Date.now(),
                        time: now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' }) + ' น.',
                        date: now.toLocaleDateString('th-TH', { day: '2-digit', month: '2-digit', year: 'numeric' }),
                        title: `รหัสเข้าใช้งาน ${activeService.name} (${data.system || reqData.system})`,
                        code: data.code,
                        service: activeService.id
                    };
                    otpList.unshift(newOtp);
                    renderOTPList(); startCooldown();
                } else {
                    if (reqData.pin !== '') {
                        pinError.textContent = `* ${data.error}`; pinError.classList.remove('hidden');
                    } else {
                        errorMsg.textContent = `* ${data.error}`; errorMsg.classList.remove('opacity-0');
                    }
                }
            } catch (error) {
                console.error("Fetch API Error:", error);
                errorMsg.textContent = '* ไม่สามารถเชื่อมต่อกับเซิร์ฟเวอร์ระบบได้ โปรดตรวจสอบเซิร์ฟเวอร์หลังบ้าน';
                errorMsg.classList.remove('opacity-0');
            }
            isLoading = false; updateButton();
        }

        function initAppGrid() {
            document.getElementById('app-grid').innerHTML = SERVICES.map((srv, index) => `
                <button onclick="goToService('${srv.id}')" class="w-full bg-white dark:bg-neutral-900 border border-neutral-100 dark:border-neutral-800 hover:border-neutral-300 dark:hover:border-neutral-700 rounded-2xl p-4 flex items-center space-x-4 shadow-sm active:scale-95 animate-slideUpFade opacity-0 transition-all duration-300" style="animation-delay: ${index * 0.1}s">
                    <div class="w-14 h-14 rounded-xl bg-neutral-100 overflow-hidden"><img src="${srv.localImage}" onerror="this.src='https://placehold.co/100x100/png'" class="w-full h-full object-cover"></div>
                    <div class="flex-1 text-left"><h3 class="text-lg font-bold">${srv.name}</h3><p class="text-sm text-neutral-500">ไปที่หน้ากรอกอีเมลเพื่อรับรหัส</p></div>
                    <svg class="w-6 h-6 text-neutral-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg>
                </button>
            `).join('');
        }

        function goToService(serviceId) {
            if (isSwitchingScreen) return;
            isSwitchingScreen = true; activeService = SERVICES.find(s => s.id === serviceId);
            document.getElementById('screen-home').classList.add('content-hidden');
            document.getElementById('main-brand-logo').classList.add('opacity-0', '-translate-x-4');

            setTimeout(() => {
                document.getElementById('screen-home').classList.add('hidden');
                document.getElementById('screen-service').classList.remove('hidden');
                document.getElementById('main-logo-img').src = activeService.localImage;
                document.getElementById('main-title-text').textContent = activeService.name;
                document.getElementById('main-title-text').className = activeService.text;

                updateButton(); renderOTPList();

                setTimeout(() => {
                    document.getElementById('screen-service').classList.remove('content-hidden');
                    document.getElementById('back-btn').classList.remove('opacity-0', 'pointer-events-none', '-translate-x-4');
                    isSwitchingScreen = false;
                }, 50);
            }, 400);
        }

        function goToHome() {
            if (isSwitchingScreen) return;
            isSwitchingScreen = true;
            document.getElementById('screen-service').classList.add('content-hidden');
            document.getElementById('back-btn').classList.add('opacity-0', '-translate-x-4');

            setTimeout(() => {
                document.getElementById('screen-service').classList.add('hidden');
                document.getElementById('screen-home').classList.remove('hidden');
                document.getElementById('email-input').value = ''; document.getElementById('device-input').value = '';

                setTimeout(() => {
                    document.getElementById('screen-home').classList.remove('content-hidden');
                    document.getElementById('main-brand-logo').classList.remove('opacity-0', '-translate-x-4');
                    activeService = null; isSwitchingScreen = false;
                }, 50);
            }, 400);
        }

        function updateButton() {
            const btn = document.getElementById('fetch-btn');
            if (isLoading) {
                btn.disabled = true; btn.className = "w-full py-4 rounded-2xl font-bold text-lg mb-8 bg-neutral-200 dark:bg-neutral-800 text-neutral-500 cursor-not-allowed tracking-wide flex items-center justify-center space-x-2";
                btn.innerHTML = `<svg class="animate-spin h-5 w-5 text-neutral-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> <span>กำลังตรวจสอบข้อมูล...</span>`;
            } else if (cooldown > 0) {
                btn.disabled = true; btn.className = "w-full py-4 rounded-2xl font-bold text-lg mb-8 bg-neutral-200 dark:bg-neutral-800 text-neutral-500 cursor-not-allowed flex items-center justify-center space-x-2";
                btn.innerHTML = `<span>ลองใหม่ใน ${cooldown} วินาที</span>`;
            } else {
                btn.disabled = false; btn.className = `w-full py-4 rounded-2xl font-bold text-lg mb-8 ${activeService.bgCol} text-white shadow-lg active:scale-95 transition-all flex items-center justify-center space-x-2`;
                btn.innerHTML = `<span>ค้นหาอีเมล ${activeService.name}</span>`;
            }
        }

        function renderOTPList() {
            const container = document.getElementById('otp-list-container');
            const filtered = otpList.filter(otp => otp.service === activeService.id);
            if (filtered.length === 0) {
                container.innerHTML = `<div class="text-center text-neutral-500 py-10 bg-white/50 dark:bg-neutral-900/40 rounded-2xl border border-neutral-200 dark:border-neutral-800 border-dashed backdrop-blur-sm">ยังไม่มีข้อความสำหรับบริการนี้</div>`;
                return;
            }
            container.innerHTML = filtered.map((item, index) => `
                <div class="bg-white dark:bg-neutral-900/80 border border-neutral-100 dark:border-neutral-800 hover:border-neutral-300 rounded-2xl overflow-hidden transition-all duration-300 animate-slideUpFade opacity-0" style="animation-delay: ${index * 0.1}s" onclick="toggleCard(${item.id})">
                    <div class="p-4 flex items-start gap-4 cursor-pointer">
                        <div class="w-12 h-12 rounded-xl bg-neutral-100 dark:bg-neutral-800 overflow-hidden relative"><img src="${activeService.localImage}" onerror="this.src='https://placehold.co/100x100/png'" class="w-full h-full object-cover transform scale-110"></div>
                        <div class="flex-1">
                            <div class="flex justify-between mb-1"><span class="text-sm font-medium text-neutral-600 dark:text-neutral-300">${item.date} ${item.time}</span> <span class="px-2 py-0.5 bg-emerald-50 text-emerald-600 text-xs rounded-md shadow-sm font-bold">ล่าสุด</span></div>
                            <p class="text-base font-bold text-neutral-900 dark:text-white">${item.title}</p>
                        </div>
                        <svg id="arrow-${item.id}" class="w-5 h-5 mt-2 text-neutral-400 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>
                    </div>
                    <div id="body-${item.id}" class="max-h-0 opacity-0 overflow-hidden transition-all duration-500 ease-in-out bg-neutral-50 dark:bg-black/50 border-t border-neutral-100 dark:border-neutral-800/50">
                        <div class="flex items-center justify-between py-5 px-4">
                            <div><span class="text-sm text-neutral-500 block mb-1 font-medium">รหัสยืนยันของคุณคือ</span> <span class="text-4xl font-bold tracking-widest text-neutral-900 dark:text-white">${item.code}</span></div>
                            <button onclick="copyToClipboard(event, '${item.code}', ${item.id})" id="copy-btn-${item.id}" class="px-4 py-2 rounded-xl flex items-center font-bold bg-neutral-200 dark:bg-white/10 text-neutral-700 dark:text-white hover:scale-105 active:scale-95 transition-all">คัดลอก</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function openPinModal() {
            const modal = document.getElementById('pin-modal'); const content = document.getElementById('pin-modal-content');
            document.getElementById('pin-input').value = ''; document.getElementById('pin-error').classList.add('hidden');
            modal.classList.remove('hidden'); setTimeout(() => { modal.classList.remove('opacity-0'); content.classList.remove('scale-95'); }, 10);
        }
        function closePinModal() {
            const modal = document.getElementById('pin-modal'); const content = document.getElementById('pin-modal-content');
            modal.classList.add('opacity-0'); content.classList.add('scale-95');
            setTimeout(() => { modal.classList.add('hidden'); }, 300); pendingRequest = null;
        }
        function submitPin() {
            const pin = document.getElementById('pin-input').value;
            if (pin.length < 4) { document.getElementById('pin-error').textContent = 'กรุณากรอกรหัส PIN ให้ครบ'; document.getElementById('pin-error').classList.remove('hidden'); return; }
            if (pendingRequest) { pendingRequest.pin = pin; executeFetch(pendingRequest); }
        }

        async function handleFetchOTP() {
            const email = document.getElementById('email-input').value.trim();
            const device = document.getElementById('device-input').value.trim();
            const errorMsg = document.getElementById('error-message');

            if (!email || !device) { errorMsg.textContent = '* กรุณากรอกข้อมูลให้ครบถ้วน'; errorMsg.classList.remove('opacity-0'); return; }
            errorMsg.classList.add('opacity-0');
            // ระบบเลือก systemType อัตโนมัติ: ถ้าอีเมลลงท้ายด้วย @gmail.com ใช้ Gmail, นอกนั้นใช้ MailySpace
            const systemType = email.toLowerCase().endsWith('@gmail.com') ? 'Gmail' : 'MailySpace';
            pendingRequest = { email, device, system: systemType, service: activeService.id, pin: '' };
            executeFetch(pendingRequest);
        }

        function toggleCard(id) {
            const body = document.getElementById(`body-${id}`); const arrow = document.getElementById(`arrow-${id}`);
            if (body.classList.contains('max-h-0')) { body.classList.remove('max-h-0', 'opacity-0'); body.classList.add('max-h-[200px]', 'opacity-100'); arrow.classList.add('rotate-180'); }
            else { body.classList.add('max-h-0', 'opacity-0'); body.classList.remove('max-h-[200px]', 'opacity-100'); arrow.classList.remove('rotate-180'); }
        }

        function copyToClipboard(event, code, id) {
            event.stopPropagation();
            const el = document.createElement('textarea'); el.value = code; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
            const btn = document.getElementById(`copy-btn-${id}`); btn.className = "px-4 py-2 rounded-xl flex items-center font-bold bg-emerald-100 text-emerald-600"; btn.innerText = "คัดลอกแล้ว!";
            setTimeout(() => { btn.className = "px-4 py-2 rounded-xl flex items-center font-bold bg-neutral-200 dark:bg-white/10 text-neutral-700 dark:text-white hover:scale-105 active:scale-95"; btn.innerText = "คัดลอก"; }, 2000);
        }

        let cooldownTimerId;
        function startCooldown() {
            cooldown = 15; updateButton(); clearInterval(cooldownTimerId);
            cooldownTimerId = setInterval(() => { cooldown -= 1; updateButton(); if (cooldown <= 0) clearInterval(cooldownTimerId); }, 1000);
        }

        document.getElementById('screen-service').classList.add('content-hidden');
        initAppGrid();
    </script>
</body>

</html>
